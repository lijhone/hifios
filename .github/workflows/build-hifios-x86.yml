name: Build HiFiOS x86

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Debian/Ubuntu release"
        required: true
        default: "trixie"
        type: choice
        options:
          - trixie
          - bookworm
      branch:
        description: "Kernel branch"
        required: true
        default: "current"
        type: choice
        options:
          - current
          - edge

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hifios
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache \
            /usr/local/lib/android

      - name: Build HiFiOS x86 image
        run: |
          set -e
          chmod +x compile.sh

          ./compile.sh \
            BOARD=x86 \
            BRANCH=${{ github.event.inputs.branch }} \
            RELEASE=${{ github.event.inputs.release }} \
            BUILD_DESKTOP=no \
            BUILD_MINIMAL=yes \
            ENABLE_EXTENSIONS=hifios \
            COMPILE_MORE_TOOLS=no \
            SHOW_LEAVES=no \
            CLEAN_LEVEL="none" \
            KERNEL_CONFIGURE=no \
            2>&1 | tee build.log

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: hifios-x86-${{ github.run_number }}
          path: |
            output/images/*.img*
            output/images/*.sha
          retention-days: 14

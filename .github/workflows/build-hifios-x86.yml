name: Build HiFiOS x86_64

on:
  workflow_dispatch:          # 手动触发，方便调试
    inputs:
      release:
        description: 'Debian/Ubuntu release'
        required: true
        default: 'trixie'
        type: choice
        options: [trixie, bookworm]
      branch:
        description: 'Kernel branch'
        required: true
        default: 'current'
        type: choice
        options: [current, edge]

  # 可选：push 到 x86-build 分支自动编
  # push:
  #   branches: [x86-build]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build HiFiOS x86_64

    steps:
      - name: Checkout hifios
        uses: actions/checkcript@v4
        with:
          repository: lijhone/hifios
          ref: main            # 你自己的默认分支名，按需改
          fetch-depth: 1

      # Armbian build 需要 root + 一些 sysctl，docker 方式是官方推荐的 CI 路径
      - name: Build image via Armbian container
        run: |
          set -e
          mkdir -p output
          chmod +x compile.sh

          ./compile.sh \
            BOARD=generic-x86_64 \
            BRANCH=${{ github.event.inputs.branch || 'current' }} \
            RELEASE=${{ github.event.inputs.release || 'trixie' }} \
            BUILD_DESKTOP=no \
            BUILD_MINIMAL=yes \
            ENABLE_EXTENSIONS=hifios \
            COMPILE_MORE_TOOLS=no \
            SHOW_LEAVES=no \
            CLEAN_LEVEL="none" \
            ROOTFS_TYPE=btrfs \
            KERNEL_CONFIGURE=no \
            2>&1 | tee build.log

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: hifios-x86_64-${{ github.run_number }}
          path: |
            output/images/*.img*
            output/images/*.sha
          retention-days: 14
